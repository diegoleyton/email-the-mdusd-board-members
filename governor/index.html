<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email the Governor</title>
<link rel="icon" type="image/png" href="../logo.png">

<style>
:root{
  --bg:#f3f7ff;
  --text:#0f172a;
  --muted:#475569;
  --border:#dbeafe;
  --blue:#1d4ed8;
  --dangerBorder:#fecaca;
  --dangerBg:#fff1f2;
  --dangerText:#7f1d1d;
  --hintBg:#eff6ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#fff;
  color:var(--text);
}

.page{
  max-width:920px;
  margin:auto;
  padding:18px;
}

.wrap{
  background:var(--bg);
  padding:18px;
  border-radius:16px;
  border:1px solid var(--border);
}

.titleBlock{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:12px;
}

.titleLogo{
  width:240px;
  height:90px;
  object-fit:contain;
  margin-inline:auto;
}

.title{
  font-size:22px;
  margin:0;
  text-align:left;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

label{
  font-size:13px;
  color:var(--muted);
  display:block;
  margin-top:12px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid #c7d7ff;
  background:#f9fbff;
  font-size:16px;
  outline:none;
}

input::placeholder{ color:#94a3b8; opacity:1; }

input:focus, select:focus{
  border-color:#93c5fd;
  box-shadow:0 0 0 3px rgba(37,99,235,.14);
}

.warning{
  display:none;
  margin-top:8px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--dangerBorder);
  background:var(--dangerBg);
  color:var(--dangerText);
  font-size:13px;
  line-height:1.35;
}
.warning.show{display:block;}

.needsField{ border-color:#fca5a5 !important; }

.hint{
  margin-top:8px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--hintBg);
  color:var(--muted);
  font-size:12px;
  line-height:1.35;
}

.subtitle{
  margin-top:12px;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.gmailToggle{
  margin-top:14px;
  width:100%;
}

.gmailToggle label{
  display:grid;
  grid-template-columns: 22px 1fr;
  align-items:start;
  column-gap:10px;
  cursor:pointer;
  margin:0;
  width:100%;
}

.gmailToggle input[type="checkbox"]{
  width:18px;
  height:18px;
  margin:2px 0 0 0;
  justify-self:start;
}

.gmailToggle .toggleText{
  line-height:1.25;
  color:var(--muted);
  font-size:13px;
}

.sendWrap{ margin-top:16px; }

.sendBtn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--blue);
  color:#fff;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
  transition:.15s;
}
.sendBtn:hover{ filter:brightness(.97); }
.sendBtn:disabled{ opacity:.55; cursor:not-allowed; }

.helper{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

/* Manual menu */
.manualLink{
  margin-top:12px;
  font-size:13px;
  color:var(--blue);
  font-weight:700;
  cursor:pointer;
  user-select:none;
  display:inline-flex;
  gap:6px;
  align-items:center;
}
.manualLink.disabled{
  opacity:.5;
  cursor:not-allowed;
}

.manualMenu{
  display:none;
  margin-top:10px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  padding:12px;
}
.manualMenu.show{ display:block; }

.manualTitle{
  font-size:13px;
  color:var(--muted);
  margin:0 0 10px 0;
  line-height:1.35;
}

.copyGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

@media(min-width:640px){
  .copyGrid{ grid-template-columns:1fr 1fr 1fr; }
}

.copyBtn{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#f8fbff;
  cursor:pointer;
  font-size:14px;
  font-weight:800;
  color:var(--text);
  transition:.15s;
}
.copyBtn:hover{ filter:brightness(.98); }
.copyBtn:active{ transform:translateY(1px); }

.copied{
  margin-top:10px;
  font-size:12px;
  color:#16a34a;
  font-weight:800;
  display:none;
}
.copied.show{ display:block; }

/* Counter pill */
.counterPill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:12px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
  font-size:13px;
  color:var(--muted);
}
.counterNumber{
  font-weight:900;
  color:var(--text);
}
.counterDot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:#16a34a;
  display:inline-block;
}
</style>
</head>

<body>
<div class="page">
  <div class="wrap">

    <div class="titleBlock">
      <img class="titleLogo" src="../logo2.png" alt="logo">
      <h2 class="title" id="pageTitle">Email the Governor</h2>

      <div class="counterPill" id="counterPill" style="display:none;">
        <span class="counterDot" aria-hidden="true"></span>
        <span id="counterLabel"></span>
        <span class="counterNumber" id="counterValue">—</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <label id="lblLang">Language/Idioma</label>
      <select id="lang">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
      <div class="hint" id="langHint"></div>
    </div>

    <div class="subtitle" id="subtitle"></div>

    <div class="card">

      <label id="lblName">Your Name</label>
      <input id="senderName" placeholder="Your full name" autocomplete="name">
      <div class="warning" id="nameWarning"></div>

      <label id="lblCity">City</label>
      <input id="city" placeholder="City">
      <div class="warning" id="cityWarning"></div>

      <label id="lblZip">Zip Code</label>
      <input id="zipcode" placeholder="Zip code" inputmode="numeric" autocomplete="postal-code">
      <div class="warning" id="zipWarning"></div>

      <label id="lblContact">Contact</label>
      <input id="contact" placeholder="email / phone" autocomplete="email">
      <div class="warning" id="contactWarning"></div>

      <div class="gmailToggle" id="gmailToggle">
        <label>
          <input type="checkbox" id="gmailCheck">
          <span class="toggleText" id="gmailToggleText"></span>
        </label>
      </div>

      <div class="sendWrap">
        <button class="sendBtn" id="sendBtn" disabled>Generate Message</button>
      </div>

      <div class="helper" id="helperText"></div>

      <div class="manualLink" id="manualToggle" role="button" tabindex="0">
        <span id="manualToggleText">Could't Generate Message? Do it Manually</span> <span aria-hidden="true">▾</span>
      </div>

      <div class="manualMenu" id="manualMenu">
        <p class="manualTitle" id="manualTitle"></p>

        <div class="copyGrid">
          <button class="copyBtn" id="copySubjectBtn"></button>
          <button class="copyBtn" id="copyToBtn"></button>
          <button class="copyBtn" id="copyBodyBtn"></button>
        </div>

        <div class="copied" id="copiedToast">Copied ✓</div>
      </div>

    </div>
  </div>
</div>

<script>
/* =========================================================
   CAMPAIGN + STORAGE KEYS
========================================================= */
const CAMPAIGN = "governor";

const langKey   = "mdusd_lang_v1";                 // shared across tabs (as you wanted)
const nameKey   = "mdusd_senderName_v1_" + CAMPAIGN;
const cityKey   = "mdusd_city_v1_" + CAMPAIGN;
const zipKey    = "mdusd_zip_v1_" + CAMPAIGN;
const contactKey= "mdusd_contact_v1_" + CAMPAIGN;
const anonIdKey = "mdusd_anon_id_v1_" + CAMPAIGN;

/* =========================================================
   TRACKING BACKEND
========================================================= */
const TRACK_URL = "https://script.google.com/macros/s/AKfycbzLYxe6mTdCKx8GvBLNNnOaDIcqUG6I1vqXC4FMv4HErVpBlMlTAmJCy6BXegvF_OzroA/exec";

/* =========================================================
   EMAIL CONTENT (ALWAYS ENGLISH)
========================================================= */
const SUBJECT = "Urgent Request for State Leadership on MDUSD Dual Immersion Program Decision";

const BASE = `Dear Governor Newsom,

I am writing as a concerned community member regarding the recent decision by the Mount Diablo Unified School District (MDUSD) to eliminate the long-standing, beloved, high-performing Spanish Immersion program at Bancroft Elementary in Walnut Creek, with extremely short notice and without involving program families.

On January 28, 2026, families were informed less than two weeks before kindergarten enrollment opened that the district would not accept new kindergarteners into the Bancroft Spanish immersion program, and instead, kindergarteners were given the option to enroll in a new program at another school. This decision was announced without meaningful community engagement or required consultations with advisory bodies such as the English Learner Advisory Committee (ELAC), the District English Learner Advisory Committee (DELAC), the Local Control and Accountability Plan (LCAP) committee, or the Bancroft School Site Council, all of which are core components of the California Education Code governing major program changes.

Available data show that the district’s stated reasons for the elimination, staffing shortages, space limitations, and performance concerns have been shown to be inaccurate or unrelated to the decision. Many families made significant life decisions to attend the Spanish Immersion Program at Bancroft Elementary, including purchasing homes near the school, to support their children’s bilingual education and cultural identity.

This decision risks undermining equity, reducing diversity in high-performing schools, and eroding trust in the district’s process. In 2022, efforts to isolate Walnut Creek Schools, including Bancroft Elementary and the middle school and high school that Bancroft feeds into, were stopped by the California Department of Education because the move "had undertones of racial and socioeconomic segregation.”

The concerned parents of Spanish Immersion students launched a petition that already has over 550 signatures, and they have attended the board meetings and city council meetings to provide public testimony calling for a pause, transparency, and lawful public engagement before major changes are implemented.

Governor Newsom, California has a longstanding commitment to educational equity, meaningful family engagement, and access to high-quality bilingual education. I respectfully ask for your leadership in urging the Mount Diablo Unified School District to:

• Pause the termination of the Bancroft Spanish Immersion program immediately;
• Ensure full compliance with California Education Code requirements for community engagement and transparency;
• Work with MDUSD and affected families to explore solutions that preserve access to high-quality bilingual education at Bancroft Elementary and beyond.

Thank you for your attention to this matter and for your leadership in supporting educational equity for all California families.`;

/* =========================================================
   RECIPIENTS (list of emails)
========================================================= */
const RECIPIENT_EMAILS = [
  "governor@governor.ca.gov",
  "gavin.newsom@gov.ca.gov"
];

// Works for 1 or many
const TO_ALL = RECIPIENT_EMAILS
  .map(e => String(e || "").trim())
  .filter(Boolean)
  .join(",");

/* =========================================================
   UI LANGUAGE STRINGS (form changes; email stays English)
========================================================= */
const STRINGS = {
  en: {
    pageTitle: "Email the Governor",
    subtitle: `Fill out the form, then click <b>Generate Message</b> to open your email with a prepared draft addressed to the Governor. Please review it and send it.<br><br>
<b>Note:</b> For participation tracking, we record your name (and basic form fields), but not your email address.`,
    langHint: `Note: The email message will always be generated in <b>English</b>.`,

    lblName: "Your full name",
    namePh: "Your full name",
    nameWarn: "Please enter your full name.",

    lblCity: "City",
    cityPh: "City",
    cityWarn: "Please enter your city.",

    lblZip: "Zip code",
    zipPh: "Zip code",
    zipWarn: "Please enter your zip code.",

    lblContact: "Contact",
    contactPh: "email / phone",
    contactWarn: "Please enter a contact (email / phone).",
    contactHint: "Suggested format: email / phone",

    gmailToggleText: "Use Gmail website instead of your email app",
    sendBtn: "Generate Message",
    helper: `<b>Tip:</b> A draft email will open pre-filled. Please review, then press Send.`,

    manualToggleText: "Couldn't generate message? Do it manually",
    manualTitle: "If you prefer to compose the email manually, use these buttons to copy the subject, recipients, and message.",
    copySubject: "Copy subject",
    copyTo: "Copy recipients",
    copyBody: "Copy message",
    copied: "Copied ✓",
    needForm: "Please fill out the form first.",
    counterLabel: "Recorded participants:"
  },
  es: {
    pageTitle: "Enviar correo al Gobernador",
    subtitle: `Complete el formulario y luego presione <b>Generar Mensaje</b> para abrir su correo con un borrador listo dirigido al Gobernador. Por favor revise y envíe.<br><br>
<b>Nota:</b> Para fines de conteo se registrará su nombre (y campos básicos del formulario), no su correo.`,
    langHint: `Nota: El mensaje del correo siempre se generará en <b>inglés</b>.`,

    lblName: "Su nombre completo",
    namePh: "Su nombre completo",
    nameWarn: "Por favor escriba su nombre completo.",

    lblCity: "Ciudad",
    cityPh: "Ciudad",
    cityWarn: "Por favor escriba su ciudad.",

    lblZip: "Código postal",
    zipPh: "Código postal",
    zipWarn: "Por favor escriba su código postal.",

    lblContact: "Contacto",
    contactPh: "email / teléfono",
    contactWarn: "Por favor escriba un contacto (email / teléfono).",
    contactHint: "Formato sugerido: email / teléfono",

    gmailToggleText: "Usar el sitio web de Gmail en vez de su aplicación de email",
    sendBtn: "Generar Mensaje",
    helper: `<b>Consejo:</b> Se abrirá un borrador listo. Revíselo y luego presione Enviar.`,

    manualToggleText: "¿No pudo generar el mensaje? Hágalo manualmente",
    manualTitle: "Si prefiere redactar el correo manualmente, use estos botones para copiar el asunto, los destinatarios y el mensaje.",
    copySubject: "Copiar asunto",
    copyTo: "Copiar destinatarios",
    copyBody: "Copiar mensaje",
    copied: "Copiado ✓",
    needForm: "Primero complete el formulario.",
    counterLabel: "Participación registrada:"
  }
};

/* =========================================================
   HELPERS
========================================================= */
function getLang(){ return localStorage.getItem(langKey) || "en"; }
function setLang(v){ localStorage.setItem(langKey, v); }

function $(id){ return document.getElementById(id); }

function getSenderName(){ return ($("senderName").value || "").trim(); }
function getCity(){ return ($("city").value || "").trim(); }
function getZip(){ return ($("zipcode").value || "").trim(); }
function getContact(){ return ($("contact").value || "").trim(); }

function setWarning(elId, show){
  const el = $(elId);
  if (!el) return;
  el.classList.toggle("show", !!show);
}
function setNeedsField(fieldId, needs){
  const el = $(fieldId);
  if (!el) return;
  el.classList.toggle("needsField", !!needs);
}

function showCopiedToast(){
  const t = $("copiedToast");
  const s = STRINGS[getLang()];
  t.textContent = s.copied;
  t.classList.add("show");
  clearTimeout(showCopiedToast._timer);
  showCopiedToast._timer = setTimeout(()=>t.classList.remove("show"), 1400);
}

async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    showCopiedToast();
    return true;
  }catch(err){
    try{
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.setAttribute("readonly","");
      ta.style.position="fixed";
      ta.style.top="-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showCopiedToast();
      return true;
    }catch(e){
      return false;
    }
  }
}

function applyLanguage(){
  const lang = getLang();
  const s = STRINGS[lang];

  document.documentElement.lang = lang;
  $("pageTitle").textContent = s.pageTitle;
  $("subtitle").innerHTML = s.subtitle;

  $("lblLang").textContent = "Language/Idioma";
  $("langHint").innerHTML = s.langHint;

  $("counterLabel").textContent = s.counterLabel;

  $("lblName").textContent = s.lblName;
  $("senderName").placeholder = s.namePh;
  $("nameWarning").textContent = s.nameWarn;

  $("lblCity").textContent = s.lblCity;
  $("city").placeholder = s.cityPh;
  $("cityWarning").textContent = s.cityWarn;

  $("lblZip").textContent = s.lblZip;
  $("zipcode").placeholder = s.zipPh;
  $("zipWarning").textContent = s.zipWarn;

  $("lblContact").textContent = s.lblContact;
  $("contact").placeholder = s.contactPh;
  $("contactWarning").textContent = s.contactWarn;

  $("gmailToggleText").textContent = s.gmailToggleText;
  $("sendBtn").textContent = s.sendBtn;
  $("helperText").innerHTML = s.helper;

  $("manualToggleText").textContent = s.manualToggleText;
  $("manualTitle").textContent = s.manualTitle;

  $("copySubjectBtn").textContent = s.copySubject;
  $("copyToBtn").textContent = s.copyTo;
  $("copyBodyBtn").textContent = s.copyBody;
}

/* =========================================================
   COUNTER
========================================================= */
async function refreshCounter(){
  const cacheKey = "mdusd_people_count_cache_v1_" + CAMPAIGN;
  const cached = localStorage.getItem(cacheKey);
  if (cached){
    try{
      const obj = JSON.parse(cached);
      if (obj && typeof obj.value === "number" && (Date.now() - obj.ts) < 10*60*1000){
        setCounterUI(obj.value);
        return;
      }
    }catch(e){}
  }

  try{
    const res = await fetch(TRACK_URL + "?stats=1&campaign=" + encodeURIComponent(CAMPAIGN), { method:"GET" });
    const json = await res.json();
    if (json && json.ok && typeof json.peopleCount === "number"){
      localStorage.setItem(cacheKey, JSON.stringify({ value: json.peopleCount, ts: Date.now() }));
      setCounterUI(json.peopleCount);
    }
  }catch(e){
    // silent
  }
}

function setCounterUI(count){
  const pill = $("counterPill");
  const val = $("counterValue");
  if (!pill || !val) return;

  val.textContent = String(count);
  pill.style.display = "inline-flex";
}

/* =========================================================
   VALIDATION + MANUAL MENU GATE
========================================================= */
function setManualEnabled(enabled){
  const link = $("manualToggle");
  link.classList.toggle("disabled", !enabled);
  link.setAttribute("aria-disabled", enabled ? "false" : "true");
  link.tabIndex = enabled ? 0 : -1;
  if (!enabled) $("manualMenu").classList.remove("show");
}

function validate(){
  const nameOk = getSenderName().length > 0;
  const cityOk = getCity().length > 0;
  const zipOk = getZip().length > 0;
  const contactOk = getContact().length > 0;

  setWarning("nameWarning", !nameOk);
  setNeedsField("senderName", !nameOk);

  setWarning("cityWarning", !cityOk);
  setNeedsField("city", !cityOk);

  setWarning("zipWarning", !zipOk);
  setNeedsField("zipcode", !zipOk);

  setWarning("contactWarning", !contactOk);
  setNeedsField("contact", !contactOk);

  const ok = nameOk && cityOk && zipOk && contactOk;
  $("sendBtn").disabled = !ok;
  setManualEnabled(ok);
  return ok;
}

/* =========================================================
   EMAIL (ALWAYS ENGLISH)
========================================================= */
function buildBodyEnglish(){
  const sender = getSenderName();
  const city = getCity();
  const zipcode = getZip();
  const contact = getContact();

  return `${BASE}

Respectfully,
${sender}
${city}, ${zipcode}
${contact}`;
}

function openEmailToAll(){
  if (!validate()) return;

  trackEvent("generate");

  const gmail = $("gmailCheck").checked;
  const body = buildBodyEnglish();

  if (gmail){
    const link =
      `https://mail.google.com/mail/?view=cm&fs=1` +
      `&to=${encodeURIComponent(TO_ALL)}` +
      `&su=${encodeURIComponent(SUBJECT)}` +
      `&body=${encodeURIComponent(body)}`;

    window.open(link, "_blank");
    return;
  }

  // Note: mailto supports comma-separated recipients in most clients
  const link =
    `mailto:${encodeURIComponent(TO_ALL)}` +
    `?subject=${encodeURIComponent(SUBJECT)}` +
    `&body=${encodeURIComponent(body)}`;

  window.location.href = link;
}

function isMobileDevice(){
  return (
    window.matchMedia("(max-width: 768px)").matches ||
    navigator.maxTouchPoints > 1 ||
    /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
  );
}

/* =========================================================
   MANUAL MENU BEHAVIOR
========================================================= */
function toggleManualMenu(){
  const ok = validate();
  if (!ok) {
    const s = STRINGS[getLang()];
    alert(s.needForm);
    return;
  }
  $("manualMenu").classList.toggle("show");
}

function setupManualButtons(){
  $("copySubjectBtn").addEventListener("click", async ()=>{
    const ok = await copyText(SUBJECT);
    if(ok) trackEvent("copy_subject");
  });

  $("copyToBtn").addEventListener("click", async ()=>{
    const ok = await copyText(TO_ALL);
    if(ok) trackEvent("copy_to");
  });

  $("copyBodyBtn").addEventListener("click", async ()=>{
    const ok = await copyText(buildBodyEnglish());
    if(ok) trackEvent("copy_body");
  });
}

/* =========================================================
   LOGGING
========================================================= */
function getAnonId(){
  let id = localStorage.getItem(anonIdKey);
  if(!id){
    id = (crypto?.randomUUID?.() || ("id_" + Math.random().toString(16).slice(2) + Date.now()));
    localStorage.setItem(anonIdKey, id);
  }
  return id;
}

async function trackEvent(action){
  // Backend requires "connection" today; we send a fixed value and keep it out of UI.
  const payload = {
    campaign: CAMPAIGN,
    action,
    name: getSenderName(),
    connection: "N/A",
    anonId: getAnonId(),
    userAgent: navigator.userAgent,
    referrer: document.referrer || location.href
  };

  try{
    fetch(TRACK_URL, {
      method: "POST",
      body: JSON.stringify(payload) // text/plain by default (no preflight)
    });
  }catch(e){
    // ignore
  }
}

/* =========================================================
   INIT
========================================================= */
(function init(){
  // Restore saved fields
  const savedName = (localStorage.getItem(nameKey) || "").trim();
  if (savedName) $("senderName").value = savedName;

  const savedCity = (localStorage.getItem(cityKey) || "").trim();
  if (savedCity) $("city").value = savedCity;

  const savedZip = (localStorage.getItem(zipKey) || "").trim();
  if (savedZip) $("zipcode").value = savedZip;

  const savedContact = (localStorage.getItem(contactKey) || "").trim();
  if (savedContact) $("contact").value = savedContact;

  // Language
  $("lang").value = getLang();
  applyLanguage();

  $("lang").addEventListener("change", (e)=>{
    setLang(e.target.value);
    applyLanguage();
    validate();
  });

  // Persist on input
  $("senderName").addEventListener("input", ()=>{
    localStorage.setItem(nameKey, getSenderName());
    validate();
  });
  $("city").addEventListener("input", ()=>{
    localStorage.setItem(cityKey, getCity());
    validate();
  });
  $("zipcode").addEventListener("input", ()=>{
    localStorage.setItem(zipKey, getZip());
    validate();
  });
  $("contact").addEventListener("input", ()=>{
    localStorage.setItem(contactKey, getContact());
    validate();
  });

  $("sendBtn").addEventListener("click", openEmailToAll);

  const manualToggle = $("manualToggle");
  manualToggle.addEventListener("click", toggleManualMenu);
  manualToggle.addEventListener("keydown", (e)=>{
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      toggleManualMenu();
    }
  });

  setupManualButtons();
  validate();
  refreshCounter();

  // Hide Gmail toggle on mobile
  if (isMobileDevice()){
    $("gmailCheck").checked = false;
    const g = $("gmailToggle");
    if (g) g.style.display = "none";
  }
})();
</script>
</body>
</html>
